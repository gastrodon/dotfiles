name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

jobs:
  nixfmt:
    name: nixfmt
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: check formatting
        run: |
          nix shell nixpkgs#nixfmt -c sh -c \
            'find . -name "*.nix" ! -path "./.git/*" | xargs nixfmt --check'

  build:
    name: build (${{ matrix.host }}, ${{ matrix.target }})
    needs: nixfmt
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - { host: stone,  target: build }
          - { host: twink,  target: build }
          - { host: server, target: build }
          - { host: server, target: iso   }
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: build
        run: |
          if [ "${{ matrix.target }}" = "iso" ]; then
            nix build \
              ".#nixosConfigurations.${{ matrix.host }}-installer.config.system.build.isoImage" \
              --impure
          else
            nix build \
              ".#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel" \
              --impure
          fi

      - name: upload iso
        if: matrix.target == 'iso'
        uses: actions/upload-artifact@v6
        with:
          name: iso-${{ matrix.host }}
          path: result/iso/*.iso

  release:
    name: release (${{ matrix.host }})
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        host: [server]
    steps:
      - name: download iso
        uses: actions/download-artifact@v7
        with:
          name: iso-${{ matrix.host }}

      - name: create release
        run: |
          gh release create "${{ github.ref_name }}" \
            *.iso \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
